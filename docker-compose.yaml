services:
  vicky.api:
    container_name: vicky.api
    build: 
      context: .
      dockerfile: Vicky.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
    ports:
      - 8080:8080
    depends_on:
      - database
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vicky
      POSTGRES_PASSWORD: vicky
      POSTGRES_DB: vicky
    ports:
      - "5432:5432"
    volumes:
      - ./Migrations:/docker-entrypoint-initdb.d